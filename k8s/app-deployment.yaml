apiVersion: apps/v1
kind: Deployment
metadata:
  name: dheli-app
  namespace: dheli
  labels:
    app: dheli-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: dheli-app
  template:
    metadata:
      labels:
        app: dheli-app
    spec:
      containers:
        - name: dheli-app
          image: us-west2-docker.pkg.dev/YOUR_PROJECT_ID/dheli/dheli-app:YOUR_GIT_SHA
          ports:
            - containerPort: 3000
          env:
            - name: NODE_ENV
              value: "production"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: dheli-secrets
                  key: DATABASE_URL
            - name: SESSION_SECRET
              valueFrom:
                secretKeyRef:
                  name: dheli-secrets
                  key: SESSION_SECRET
            - name: ADMIN_SECRET
              valueFrom:
                secretKeyRef:
                  name: dheli-secrets
                  key: ADMIN_SECRET
            - name: GEMINI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: dheli-secrets
                  key: GEMINI_API_KEY
            - name: NEXT_PUBLIC_SUPABASE_URL
              valueFrom:
                secretKeyRef:
                  name: dheli-secrets
                  key: NEXT_PUBLIC_SUPABASE_URL
            - name: NEXT_PUBLIC_SUPABASE_ANON_KEY
              valueFrom:
                secretKeyRef:
                  name: dheli-secrets
                  key: NEXT_PUBLIC_SUPABASE_ANON_KEY
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /api/halls
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/halls
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 3
